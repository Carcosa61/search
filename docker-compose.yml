name: search

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: monitoring
      POSTGRES_USER: monitoring
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://monitoring:${DB_PASSWORD:-changeme}@db:5432/monitoring
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - internal
    volumes:
      - ./app:/app

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: python -m app.tasks.workers
    env_file: .env
    environment:
      DATABASE_URL: postgresql://monitoring:${DB_PASSWORD:-changeme}@db:5432/monitoring
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - internal
    volumes:
      - ./app:/app

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    command: python -m app.tasks.scheduler
    env_file: .env
    environment:
      DATABASE_URL: postgresql://monitoring:${DB_PASSWORD:-changeme}@db:5432/monitoring
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - internal
    volumes:
      - ./app:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api
    ports:
      - "127.0.0.1:8097:3000"
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
