<VirtualHost *:80>
    ServerName search.562196621.xyz
    Redirect permanent / https://search.562196621.xyz/
</VirtualHost>

<VirtualHost *:443>
    ServerName search.562196621.xyz

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/search.562196621.xyz/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/search.562196621.xyz/privkey.pem

    # Frontend proxy
    ProxyPreserveHost On
    ProxyPass        /api  http://localhost:8000/api
    ProxyPassReverse /api  http://localhost:8000/api

    ProxyPass        /     http://localhost:8097/
    ProxyPassReverse /     http://localhost:8097/

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"

    ErrorLog  ${APACHE_LOG_DIR}/search_error.log
    CustomLog ${APACHE_LOG_DIR}/search_access.log combined
</VirtualHost>
